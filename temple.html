<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>題を記入 - Book Log</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <h1>Book Log</h1>
    </header>

    <main>
        <a href="../index.html" class="back-link">← 一覧に戻る</a>

        <div class="book-header">
            <h2 class="book-title">題を記入</h2>
            
            <div class="book-author-row">
                <p class="book-author">著者:  / 出版社: </p>
                <a href="リンクを添付" target="_blank" class="amazon-btn">Amazon</a>
            </div>

            <div class="book-date-rating">
                <span class="star-rating">★★★☆☆</span>
                <small>読了日: </small>
            </div>

            <details class="book-summary-accordion">
                <summary class="summary-button">概要</summary>
                <div class="summary-content">
                    <p>
                        概要を記入
                    </p>
                </div>
            </details>

            <div class="book-image-right">
                <img src="../images/" alt="の表紙">
            </div>
        </div>

        <div class="book-content">
            <h3>感想</h3>
            <p>
                感想を記入
            </p>
        </div>
    </main>

    <footer>
        <h2>Book Log</h2>
        <p>読んだ本を忘れてしまうから記録する目的で作成</p>
        <p><small>最終更新日 2026/07/16</small></p>
    </footer>
</body>
</html>
